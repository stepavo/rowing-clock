<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0a0f1c"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e2d47"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </radialGradient>
  </defs>
  <!-- Circular ring -->
  <circle cx="256" cy="230" r="150" fill="none" stroke="#1e2d47" stroke-width="18"/>
  <circle cx="256" cy="230" r="150" fill="none" stroke="#22c55e" stroke-width="18"
    stroke-linecap="round" stroke-dasharray="628" stroke-dashoffset="160"
    transform="rotate(-90 256 230)"/>
  <!-- Oar / rowing icon -->
  <text x="256" y="280" text-anchor="middle" font-size="130" font-family="sans-serif">🚣</text>
  <!-- Label -->
  <text x="256" y="430" text-anchor="middle" font-size="52" font-weight="700"
    font-family="'Segoe UI',sans-serif" fill="#f0f6ff" letter-spacing="4">ROW</text>
</svg>
