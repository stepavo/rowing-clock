<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rowing Workout Clock</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Row Clock">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg: #0a0f1c;
    --panel: #111827;
    --border: #1e2d47;
    --accent: #2563eb;
    --accent2: #0ea5e9;
    --work: #22c55e;
    --rest: #f97316;
    --text: #f0f6ff;
    --muted: #6b7a99;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    font-size: 1.1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 svg { opacity: 0.7; }

  /* Tab switcher */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .tab-btn {
    padding: 10px 28px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* Mode panels */
  .mode-panel { display: none; width: 100%; max-width: 560px; }
  .mode-panel.active { display: flex; flex-direction: column; align-items: center; }

  /* Config row */
  .config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    width: 100%;
    margin-bottom: 20px;
  }
  .config-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .config-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .time-input-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .time-input-row input {
    width: 44px;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 700;
    padding: 4px 0;
    outline: none;
    -moz-appearance: textfield;
  }
  .time-input-row input::-webkit-inner-spin-button { display: none; }
  .time-input-row input:focus { border-color: var(--accent2); }
  .time-sep { font-size: 1.1rem; font-weight: 700; color: var(--muted); }
  .spinners { display: flex; flex-direction: column; gap: 2px; }
  .spin-btn {
    width: 20px; height: 14px;
    background: var(--border);
    border: none; border-radius: 4px;
    color: var(--text); cursor: pointer;
    font-size: 0.65rem; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .spin-btn:hover { background: var(--accent); }

  .num-input-wrap { display: flex; align-items: center; gap: 6px; }
  .num-input-wrap input {
    width: 52px;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 1.2rem;
    font-weight: 700;
    padding: 4px 0;
    outline: none;
    -moz-appearance: textfield;
  }
  .num-input-wrap input::-webkit-inner-spin-button { display: none; }
  .num-input-wrap input:focus { border-color: var(--accent2); }
  .inc-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: var(--border);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .inc-btn:hover { background: var(--accent); }

  /* Clock face */
  .clock-face {
    position: relative;
    width: 300px; height: 300px;
    margin: 10px 0 18px;
  }
  .clock-face svg { position: absolute; top: 0; left: 0; }
  .clock-inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
  }
  .phase-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    transition: color 0.3s;
  }
  .time-display {
    font-size: 4.8rem;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }
  .interval-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Progress bar */
  .progress-bar-wrap {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 8px;
    transition: width 0.5s linear, background 0.3s;
  }

  /* Controls */
  .controls { display: flex; gap: 14px; margin-bottom: 18px; }
  .ctrl-btn {
    padding: 14px 34px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .ctrl-btn:active { transform: scale(0.97); }
  .btn-start {
    background: var(--work);
    color: #fff;
    box-shadow: 0 0 18px rgba(34,197,94,0.3);
  }
  .btn-start:hover { filter: brightness(1.1); }
  .btn-pause {
    background: var(--rest);
    color: #fff;
    box-shadow: 0 0 18px rgba(249,115,22,0.3);
  }
  .btn-pause:hover { filter: brightness(1.1); }
  .btn-reset {
    background: var(--panel);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-reset:hover { color: var(--text); border-color: var(--muted); }

  /* Interval list */
  .interval-list-wrap {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    max-height: 160px;
    overflow-y: auto;
  }
  .interval-list-title {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .interval-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .interval-row:last-child { border-bottom: none; }
  .interval-row.current { opacity: 1; font-weight: 700; }
  .interval-row.done { opacity: 0.25; text-decoration: line-through; }
  .pill {
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .pill-work { background: rgba(34,197,94,0.2); color: var(--work); }
  .pill-rest { background: rgba(249,115,22,0.2); color: var(--rest); }

  /* Flash overlay */
  .flash {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 999;
  }
  .flash.show { opacity: 0.18; transition: none; }

  /* Bezel ring pulse */
  @keyframes ring-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pulsing { animation: ring-pulse 0.6s ease-in-out 3; }

  /* Done banner */
  .done-banner {
    display: none;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--work);
    text-align: center;
    padding: 14px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 12px;
    width: 100%;
    margin-bottom: 8px;
  }
  .done-banner.visible { display: block; }

  /* ── Edit-mode styles ─────────────────────────────────── */
  .edit-plan-btn {
    width: 100%; padding: 7px 14px; background: transparent;
    border: 1px dashed var(--border); border-radius: 8px;
    color: var(--muted); cursor: pointer; font-size: 0.75rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 10px; transition: all 0.2s; text-align: center;
  }
  .edit-plan-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .edit-plan-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(14,165,233,0.06); border-style: solid; }
  .interval-list-wrap { max-height: 240px; }
  .interval-row.editable { opacity: 1 !important; cursor: default; gap: 6px; }
  .interval-row.dragging { opacity: 0.3 !important; }
  .interval-row.drag-over-top { border-top: 2px solid var(--accent2); }
  .drag-handle { cursor: grab; color: var(--muted); padding-right: 4px; user-select: none; font-size: 1.05rem; flex-shrink: 0; }
  .drag-handle:active { cursor: grabbing; }
  .row-actions { display: flex; gap: 3px; flex-shrink: 0; margin-left: 2px; }
  .row-btn { width: 22px; height: 22px; border: none; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; flex-shrink: 0; transition: background 0.15s; }
  .row-btn-copy { background: rgba(14,165,233,0.15); color: var(--accent2); }
  .row-btn-copy:hover { background: rgba(14,165,233,0.32); }
  .row-btn-copy.copied { background: rgba(34,197,94,0.2); color: var(--work); }
  .row-btn-del  { background: rgba(239,68,68,0.12); color: var(--danger); }
  .row-btn-del:hover  { background: rgba(239,68,68,0.28); }
  .paste-zone { display: flex; align-items: center; gap: 6px; padding: 3px 2px; opacity: 0; pointer-events: none; transition: opacity 0.2s; cursor: pointer; }
  .paste-zone.visible { opacity: 1; pointer-events: all; }
  .paste-zone:hover .paste-label { opacity: 1; }
  .paste-zone:hover .paste-line  { opacity: 0.6; }
  .paste-line { flex: 1; height: 1px; background: var(--accent2); opacity: 0.2; transition: opacity 0.15s; }
  .paste-label { font-size: 0.62rem; letter-spacing: 0.12em; color: var(--accent2); opacity: 0.55; white-space: nowrap; transition: opacity 0.15s; }
  .add-phase-row { display: none; justify-content: center; gap: 8px; padding: 10px 0 2px; }
  .add-phase-row.visible { display: flex; }
  .add-pill-btn { padding: 4px 14px; border-radius: 20px; border: 1px dashed; background: transparent; cursor: pointer; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; transition: all 0.15s; }
  .add-pill-75  { border-color: var(--rest);  color: var(--rest);  }
  .add-pill-75:hover  { background: rgba(249,115,22,0.15); }
  .add-pill-100 { border-color: var(--work);  color: var(--work);  }
  .add-pill-100:hover { background: rgba(34,197,94,0.15); }
  .time-edit-input { width: 50px; background: var(--bg); border: 1px solid var(--accent2); border-radius: 5px; color: var(--text); font-size: 0.85rem; font-weight: 700; text-align: center; padding: 1px 3px; outline: none; flex-shrink: 0; }
  .pill.clickable:hover { filter: brightness(1.25); cursor: pointer; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<h1>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 17l4-8 4 4 4-6 4 5"/>
    <circle cx="12" cy="12" r="10"/>
  </svg>
  Rowing Workout Clock
</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="switchMode('interval')">Intervals</button>
  <button class="tab-btn" onclick="switchMode('countdown')">Countdown</button>
</div>

<!-- ═══════════════════ INTERVAL MODE ═══════════════════ -->
<div class="mode-panel active" id="panel-interval">
  <div class="config-grid">
    <div class="config-card">
      <span class="config-label" style="color:var(--work)">100% Power</span>
      <div class="time-input-row">
        <input type="number" id="i-work-min" value="2" min="0" max="59">
        <span class="time-sep">:</span>
        <input type="number" id="i-work-sec" value="0" min="0" max="59">
        <div class="spinners">
          <button class="spin-btn" onclick="adjustTime('i-work-min','i-work-sec',60)">▲</button>
          <button class="spin-btn" onclick="adjustTime('i-work-min','i-work-sec',-60)">▼</button>
        </div>
      </div>
    </div>
    <div class="config-card">
      <span class="config-label" style="color:var(--rest)">75% Power</span>
      <div class="time-input-row">
        <input type="number" id="i-rest-min" value="1" min="0" max="59">
        <span class="time-sep">:</span>
        <input type="number" id="i-rest-sec" value="0" min="0" max="59">
        <div class="spinners">
          <button class="spin-btn" onclick="adjustTime('i-rest-min','i-rest-sec',60)">▲</button>
          <button class="spin-btn" onclick="adjustTime('i-rest-min','i-rest-sec',-60)">▼</button>
        </div>
      </div>
    </div>
    <div class="config-card">
      <span class="config-label">Intervals</span>
      <div class="num-input-wrap">
        <button class="inc-btn" onclick="adjustNum('i-count',-1)">−</button>
        <input type="number" id="i-count" value="5" min="1" max="99">
        <button class="inc-btn" onclick="adjustNum('i-count',1)">+</button>
      </div>
    </div>
    <div class="config-card">
      <span class="config-label">Warmup</span>
      <div class="time-input-row">
        <input type="number" id="i-warmup-min" value="0" min="0" max="59">
        <span class="time-sep">:</span>
        <input type="number" id="i-warmup-sec" value="0" min="0" max="59">
        <div class="spinners">
          <button class="spin-btn" onclick="adjustTime('i-warmup-min','i-warmup-sec',60)">▲</button>
          <button class="spin-btn" onclick="adjustTime('i-warmup-min','i-warmup-sec',-60)">▼</button>
        </div>
      </div>
    </div>
  </div>

  <div class="clock-face">
    <svg width="300" height="300" viewBox="0 0 300 300">
      <circle cx="150" cy="150" r="140" fill="none" stroke="#1e2d47" stroke-width="10"/>
      <circle id="i-ring" cx="150" cy="150" r="140" fill="none" stroke="#2563eb"
        stroke-width="10" stroke-linecap="round"
        stroke-dasharray="879.65" stroke-dashoffset="879.65"
        transform="rotate(-90 150 150)" style="transition: stroke-dashoffset 0.5s linear, stroke 0.3s;"/>
    </svg>
    <div class="clock-inner">
      <div class="phase-label" id="i-phase-label" style="color: var(--work)">READY</div>
      <div class="time-display" id="i-time-display" style="color: var(--work)">--:--</div>
      <div class="interval-label" id="i-interval-label">— / —</div>
    </div>
  </div>

  <div class="done-banner" id="i-done-banner">🏆 Workout Complete!</div>

  <div class="controls">
    <button class="ctrl-btn btn-start" id="i-start-btn" onclick="intervalStart()">START</button>
    <button class="ctrl-btn btn-reset" onclick="intervalReset()">RESET</button>
  </div>

  <button class="edit-plan-btn" id="edit-plan-btn" onclick="toggleEditMode()">✏️ Edit Workout Plan</button>

  <div class="interval-list-wrap">
    <div class="interval-list-title">Workout Plan</div>
    <div id="i-list"></div>
  </div>
</div>

<!-- ═══════════════════ COUNTDOWN MODE ═══════════════════ -->
<div class="mode-panel" id="panel-countdown">
  <div class="config-grid" style="max-width:340px">
    <div class="config-card" style="grid-column:1/-1;">
      <span class="config-label">Duration</span>
      <div class="time-input-row" style="gap:8px;">
        <input type="number" id="c-min" value="20" min="0" max="999" style="width:58px;font-size:1.4rem;">
        <span class="time-sep" style="font-size:1.4rem;">:</span>
        <input type="number" id="c-sec" value="0" min="0" max="59" style="width:58px;font-size:1.4rem;">
        <div class="spinners">
          <button class="spin-btn" onclick="adjustTime('c-min','c-sec',60)">▲</button>
          <button class="spin-btn" onclick="adjustTime('c-min','c-sec',-60)">▼</button>
        </div>
      </div>
    </div>
  </div>

  <div class="clock-face">
    <svg width="300" height="300" viewBox="0 0 300 300">
      <circle cx="150" cy="150" r="140" fill="none" stroke="#1e2d47" stroke-width="10"/>
      <circle id="c-ring" cx="150" cy="150" r="140" fill="none" stroke="#2563eb"
        stroke-width="10" stroke-linecap="round"
        stroke-dasharray="879.65" stroke-dashoffset="0"
        transform="rotate(-90 150 150)" style="transition: stroke-dashoffset 0.5s linear, stroke 0.3s;"/>
    </svg>
    <div class="clock-inner">
      <div class="phase-label" id="c-phase-label" style="color: var(--accent2)">READY</div>
      <div class="time-display" id="c-time-display" style="color: var(--accent2)">--:--</div>
      <div class="interval-label" id="c-sub-label">Set your time above</div>
    </div>
  </div>

  <div class="done-banner" id="c-done-banner">🏆 Workout Complete!</div>

  <div class="progress-bar-wrap" style="max-width:300px">
    <div class="progress-bar" id="c-progress" style="width:100%;background:var(--accent2);"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-start" id="c-start-btn" onclick="countdownStart()">START</button>
    <button class="ctrl-btn btn-reset" onclick="countdownReset()">RESET</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────────────────────────
const CIRC = 879.65; // 2π × 140

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function getVal(id) {
  return parseInt(document.getElementById(id).value, 10) || 0;
}

function setRing(ringId, fraction) {
  // fraction 0 = empty, 1 = full
  document.getElementById(ringId).style.strokeDashoffset = CIRC * (1 - Math.max(0, Math.min(1, fraction)));
}

function flashScreen(color) {
  const f = document.getElementById('flash');
  f.style.background = color;
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 120);
}

function beep(freq, duration, type='square') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000);
  } catch(e) {}
}

function beepWork()  { beep(880, 120); setTimeout(()=>beep(1100,120),160); setTimeout(()=>beep(880,120),320); }
function beepRest()  { beep(660, 180); setTimeout(()=>beep(550,250),220); }
function beepDone()  { beep(660,150); setTimeout(()=>beep(880,150),200); setTimeout(()=>beep(1100,400),400); }
function beepTick()  { beep(660, 80, 'sine'); }

function switchMode(mode) {
  document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + mode).classList.add('active');
  event.target.classList.add('active');
  if (mode === 'interval') { intervalReset(); buildList(); }
  else { countdownReset(); }
}

function adjustTime(minId, secId, deltaSec) {
  let total = getVal(minId) * 60 + getVal(secId) + deltaSec;
  if (total < 0) total = 0;
  document.getElementById(minId).value = Math.floor(total / 60);
  document.getElementById(secId).value = String(total % 60).padStart(2,'0');
}

function adjustNum(id, delta) {
  const el = document.getElementById(id);
  const v = Math.max(1, (parseInt(el.value,10)||1) + delta);
  el.value = v;
  buildList();
}

// ─────────────────────────────────────────────────────────────────
//  INTERVAL MODE  — phase sequence: 75% → 100% → 75% per round
// ─────────────────────────────────────────────────────────────────
let iTimer          = null;
let iPhases         = [];
let iPhaseIdx       = -1;
let iRemaining      = 0;
let iTotalSec       = 0;
let iStatus         = 'idle'; // 'idle' | 'running' | 'paused' | 'done'
let iEditMode       = false;
let iClipboard      = null;
let iDragSrcIdx     = null;
let iPlanCustomized = false;

// Touch-drag state (iOS)
let iTouchDragIdx    = null;
let iTouchDragEl     = null;
let iTouchDragGhost  = null;
let iTouchDragOffX   = 0;
let iTouchDragOffY   = 0;
let iTouchDragTarget = null;

// ── Phase construction ─────────────────────────────────────────
function buildPhases() {
  const count   = getVal('i-count');
  const workSec = getVal('i-work-min')*60 + getVal('i-work-sec');
  const restSec = getVal('i-rest-min')*60 + getVal('i-rest-sec');
  const warmup  = getVal('i-warmup-min')*60 + getVal('i-warmup-sec');
  iPhases = [];
  if (warmup > 0) iPhases.push({type:'warmup', duration:warmup, label:'Warmup', round:0});
  for (let i = 1; i <= count; i++) {
    iPhases.push({type:'p75',  duration:restSec, label:`Round ${i} / ${count}`, round:i});
    iPhases.push({type:'p100', duration:workSec, label:`Round ${i} / ${count}`, round:i});
    iPhases.push({type:'p75',  duration:restSec, label:`Round ${i} / ${count}`, round:i});
  }
}

function phaseDisplayLabel(p, idx) {
  if (p.type === 'warmup') return 'Warmup';
  if (p.type === 'p100')   return `Full Power \u2014 ${p.label}`;
  const prev = iPhases[idx - 1], next = iPhases[idx + 1];
  const sub  = next && next.type === 'p100' ? ' (build-up)' : prev && prev.type === 'p100' ? ' (recovery)' : '';
  return `75% Power${sub} \u2014 ${p.label}`;
}

// ── List rendering ─────────────────────────────────────────────
function buildList() {
  if (!iPlanCustomized) buildPhases();
  const list = document.getElementById('i-list');
  list.innerHTML = '';

  if (iEditMode) list.appendChild(makePasteZone(0));

  iPhases.forEach((p, idx) => {
    if (iEditMode) {
      list.appendChild(makeEditableRow(p, idx));
      list.appendChild(makePasteZone(idx + 1));
    } else {
      const rowType = p.type === 'p100' ? 'work' : p.type === 'warmup' ? 'warmup' : 'rest';
      list.appendChild(makeRow(phaseDisplayLabel(p, idx), rowType, fmt(p.duration), idx));
    }
  });

  if (iEditMode) {
    const addRow = document.createElement('div');
    addRow.className = 'add-phase-row visible';
    addRow.innerHTML = `
      <button class="add-pill-btn add-pill-75"  onclick="addPhase(${iPhases.length},'p75')">+ 75%</button>
      <button class="add-pill-btn add-pill-100" onclick="addPhase(${iPhases.length},'p100')">+ 100%</button>
    `;
    list.appendChild(addRow);
  }
}

function makePasteZone(insertIdx) {
  const z = document.createElement('div');
  z.className = 'paste-zone' + (iClipboard ? ' visible' : '');
  z.innerHTML = '<div class="paste-line"></div><span class="paste-label">PASTE HERE</span><div class="paste-line"></div>';
  z.addEventListener('click', () => pastePhase(insertIdx));
  return z;
}

// ── Touch drag handlers (iOS / iPad) ──────────────────────────
function onTouchMove(e) {
  if (!iTouchDragGhost) return;
  e.preventDefault();
  const t = e.touches[0];
  iTouchDragGhost.style.left = (t.clientX - iTouchDragOffX) + 'px';
  iTouchDragGhost.style.top  = (t.clientY - iTouchDragOffY) + 'px';

  // Find drop target — temporarily hide ghost so elementFromPoint works
  iTouchDragGhost.style.visibility = 'hidden';
  const el = document.elementFromPoint(t.clientX, t.clientY);
  iTouchDragGhost.style.visibility = '';

  document.querySelectorAll('.drag-over-top').forEach(r => r.classList.remove('drag-over-top'));
  iTouchDragTarget = null;
  const targetRow = el && el.closest('.interval-row.editable');
  if (targetRow && targetRow !== iTouchDragEl) {
    const tIdx = parseInt(targetRow.dataset.idx, 10);
    if (!isNaN(tIdx) && tIdx !== iTouchDragIdx) {
      targetRow.classList.add('drag-over-top');
      iTouchDragTarget = tIdx;
    }
  }
}

function onTouchEnd() {
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend',  onTouchEnd);

  if (iTouchDragGhost) { iTouchDragGhost.remove(); iTouchDragGhost = null; }
  if (iTouchDragEl)    { iTouchDragEl.style.opacity = ''; iTouchDragEl = null; }
  document.querySelectorAll('.drag-over-top').forEach(r => r.classList.remove('drag-over-top'));

  const from = iTouchDragIdx, to = iTouchDragTarget;
  iTouchDragIdx = null; iTouchDragTarget = null;

  if (from !== null && to !== null && from !== to) {
    const [moved] = iPhases.splice(from, 1);
    iPhases.splice(to > from ? to - 1 : to, 0, moved);
    iPlanCustomized = true;
    buildList();
  }
}

function makeEditableRow(p, idx) {
  const rowType = p.type === 'p100' ? 'work' : p.type === 'warmup' ? 'warmup' : 'rest';
  const row = document.createElement('div');
  row.className = 'interval-row editable';
  row.dataset.idx = idx;
  row.draggable = true;

  row.addEventListener('dragstart', e => {
    iDragSrcIdx = idx;
    setTimeout(() => row.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    document.querySelectorAll('.drag-over-top').forEach(r => r.classList.remove('drag-over-top'));
  });
  row.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.drag-over-top').forEach(r => r.classList.remove('drag-over-top'));
    if (idx !== iDragSrcIdx) row.classList.add('drag-over-top');
  });
  row.addEventListener('dragleave', () => row.classList.remove('drag-over-top'));
  row.addEventListener('drop', e => {
    e.preventDefault();
    row.classList.remove('drag-over-top');
    if (iDragSrcIdx !== null && iDragSrcIdx !== idx) {
      const [moved] = iPhases.splice(iDragSrcIdx, 1);
      iPhases.splice(idx > iDragSrcIdx ? idx - 1 : idx, 0, moved);
      iPlanCustomized = true;
      buildList();
    }
    iDragSrcIdx = null;
  });

  // Drag handle
  const handle = document.createElement('span');
  handle.className = 'drag-handle';
  handle.textContent = '\u283f';
  handle.title = 'Drag to reorder';

  // Touch drag (iOS/iPad)
  handle.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = row.getBoundingClientRect();
    iTouchDragIdx  = idx;
    iTouchDragEl   = row;
    iTouchDragOffX = t.clientX - rect.left;
    iTouchDragOffY = t.clientY - rect.top;

    const ghost = row.cloneNode(true);
    ghost.style.cssText =
      'position:fixed;pointer-events:none;opacity:0.9;' +
      'background:var(--panel);border:1px solid var(--accent2);border-radius:8px;' +
      'z-index:9999;width:' + rect.width + 'px;' +
      'box-shadow:0 8px 28px rgba(0,0,0,0.7);' +
      'display:flex;align-items:center;gap:6px;padding:5px 8px;font-size:0.88rem;' +
      'left:' + (t.clientX - iTouchDragOffX) + 'px;' +
      'top:'  + (t.clientY - iTouchDragOffY) + 'px;';
    document.body.appendChild(ghost);
    iTouchDragGhost = ghost;
    row.style.opacity = '0.3';

    document.addEventListener('touchmove', onTouchMove, {passive: false});
    document.addEventListener('touchend',  onTouchEnd);
  }, {passive: false});

  // Type pill — click to toggle 75%/100%
  const pill = document.createElement('span');
  pill.className = 'pill clickable pill-' + (rowType === 'work' ? 'work' : rowType === 'warmup' ? 'work' : 'rest');
  pill.title = 'Click to switch type';
  pill.textContent = p.type === 'p100' ? '100%' : p.type === 'warmup' ? 'WRM' : '75%';
  pill.addEventListener('click', e => { e.stopPropagation(); cyclePhaseType(idx); });

  // Label
  const lbl = document.createElement('span');
  lbl.style.cssText = 'flex:1;color:var(--text);font-size:0.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
  lbl.textContent = phaseDisplayLabel(p, idx);

  // Duration — click to edit inline
  const timeSpan = document.createElement('span');
  timeSpan.style.cssText = 'color:var(--muted);cursor:pointer;flex-shrink:0;font-size:0.85rem;';
  timeSpan.textContent = fmt(p.duration);
  timeSpan.title = 'Click to edit duration';
  timeSpan.addEventListener('click', e => { e.stopPropagation(); startTimeEdit(timeSpan, idx); });

  // Action buttons
  const actions = document.createElement('div');
  actions.className = 'row-actions';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'row-btn row-btn-copy';
  copyBtn.textContent = '\u29c9';
  copyBtn.title = 'Copy phase';
  copyBtn.addEventListener('click', e => { e.stopPropagation(); copyPhase(idx, copyBtn); });

  const delBtn = document.createElement('button');
  delBtn.className = 'row-btn row-btn-del';
  delBtn.textContent = '\u2715';
  delBtn.title = 'Delete phase';
  delBtn.addEventListener('click', e => { e.stopPropagation(); deletePhase(idx); });

  actions.appendChild(copyBtn);
  actions.appendChild(delBtn);
  row.appendChild(handle);
  row.appendChild(pill);
  row.appendChild(lbl);
  row.appendChild(timeSpan);
  row.appendChild(actions);
  return row;
}

function makeRow(label, type, time, idx) {
  const row = document.createElement('div');
  row.className = 'interval-row';
  row.dataset.idx = idx;
  const pill = document.createElement('span');
  pill.className = 'pill pill-' + (type === 'work' ? 'work' : type === 'warmup' ? 'work' : 'rest');
  pill.textContent = type === 'work' ? '100%' : type === 'warmup' ? 'WARMUP' : '75%';
  row.innerHTML = `<span style="flex:1;color:var(--text)">${label}</span>`;
  row.prepend(pill);
  const t = document.createElement('span');
  t.style.color = 'var(--muted)';
  t.textContent = time;
  row.appendChild(t);
  return row;
}

function updateListHighlight(stepIdx) {
  document.querySelectorAll('#i-list .interval-row:not(.editable)').forEach(row => {
    const idx = parseInt(row.dataset.idx, 10);
    row.classList.remove('current', 'done');
    if (idx === stepIdx) {
      row.classList.add('current');
      row.scrollIntoView({block:'nearest', behavior:'smooth'});
    } else if (idx < stepIdx) {
      row.classList.add('done');
    }
  });
}

// ── Edit-mode actions ──────────────────────────────────────────
function toggleEditMode() {
  if (iStatus === 'running') return;
  iEditMode = !iEditMode;
  if (!iEditMode) iClipboard = null;
  const btn = document.getElementById('edit-plan-btn');
  btn.classList.toggle('active', iEditMode);
  btn.textContent = iEditMode ? '\u2705 Done Editing' : '\u270f\ufe0f Edit Workout Plan';
  buildList();
}

function cyclePhaseType(idx) {
  const p = iPhases[idx];
  if (p.type === 'p75')       p.type = 'p100';
  else if (p.type === 'p100') p.type = 'p75';
  iPlanCustomized = true;
  buildList();
}

function copyPhase(idx, btn) {
  iClipboard = Object.assign({}, iPhases[idx]);
  btn.textContent = '\u2713';
  btn.classList.add('copied');
  setTimeout(() => buildList(), 500);
}

function pastePhase(insertIdx) {
  if (!iClipboard) return;
  iPhases.splice(insertIdx, 0, Object.assign({}, iClipboard));
  iPlanCustomized = true;
  buildList();
}

function deletePhase(idx) {
  if (iPhases.length <= 1) return;
  iPhases.splice(idx, 1);
  iPlanCustomized = true;
  buildList();
}

function addPhase(afterIdx, type) {
  const dur = type === 'p100'
    ? (getVal('i-work-min')*60 + getVal('i-work-sec') || 120)
    : (getVal('i-rest-min')*60 + getVal('i-rest-sec') || 60);
  iPhases.splice(afterIdx, 0, {type, duration: dur, label: 'Custom', round: 0});
  iPlanCustomized = true;
  buildList();
}

function startTimeEdit(span, idx) {
  const p = iPhases[idx];
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'time-edit-input';
  input.value = fmt(p.duration);
  input.placeholder = 'mm:ss';
  const commit = () => {
    const parts = input.value.trim().split(':');
    const secs  = parts.length === 2
      ? (parseInt(parts[0],10)||0)*60 + (parseInt(parts[1],10)||0)
      : (parseInt(parts[0],10)||0);
    if (secs > 0) { iPhases[idx].duration = secs; iPlanCustomized = true; }
    buildList();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') buildList();
  });
  span.replaceWith(input);
  input.focus();
  input.select();
}

// ── Timer state machine ────────────────────────────────────────
function intervalStart() {
  if (iStatus === 'paused') {
    iStatus = 'running';
    document.getElementById('i-start-btn').textContent = 'PAUSE';
    document.getElementById('i-start-btn').className = 'ctrl-btn btn-pause';
    iRun();
    return;
  }
  if (iStatus === 'running') {
    clearInterval(iTimer);
    iStatus = 'paused';
    document.getElementById('i-start-btn').textContent = 'RESUME';
    document.getElementById('i-start-btn').className = 'ctrl-btn btn-start';
    return;
  }
  // fresh start — use current iPhases (custom or config-generated)
  document.getElementById('i-done-banner').classList.remove('visible');
  if (!iPlanCustomized) buildPhases();
  // auto-exit edit mode on start
  if (iEditMode) {
    iEditMode = false; iClipboard = null;
    const eb = document.getElementById('edit-plan-btn');
    eb.classList.remove('active');
    eb.textContent = '\u270f\ufe0f Edit Workout Plan';
  }
  buildList();
  if (!iPhases.length) return;
  iPhaseIdx = 0;
  iStatus = 'running';
  document.getElementById('i-start-btn').textContent = 'PAUSE';
  document.getElementById('i-start-btn').className = 'ctrl-btn btn-pause';
  iBeginPhase(true);
}

function iBeginPhase(isFirst) {
  const p = iPhases[iPhaseIdx];
  iRemaining = p.duration;
  iTotalSec  = p.duration;
  updateListHighlight(iPhaseIdx);
  if (!isFirst) {
    if (p.type === 'p100')        { beepWork(); flashScreen('#22c55e'); }
    else if (p.type === 'p75')    { beepRest(); flashScreen('#f97316'); }
    else if (p.type === 'warmup') { beepRest(); }
  }
  iRender();
  iRun();
}

function iRun() {
  clearInterval(iTimer);
  iTimer = setInterval(() => {
    iRemaining--;
    if (iRemaining <= 3 && iRemaining > 0) beepTick();
    if (iRemaining <= 0) {
      iPhaseIdx++;
      if (iPhaseIdx >= iPhases.length) iFinish();
      else iBeginPhase(false);
    } else {
      iRender();
    }
  }, 1000);
}

function iFinish() {
  clearInterval(iTimer);
  iStatus = 'done';
  flashScreen('#22c55e');
  beepDone();
  setRing('i-ring', 0);
  document.getElementById('i-ring').style.stroke = 'var(--work)';
  document.getElementById('i-time-display').textContent = '00:00';
  document.getElementById('i-time-display').style.color = 'var(--work)';
  document.getElementById('i-phase-label').textContent = 'DONE';
  document.getElementById('i-phase-label').style.color = 'var(--work)';
  document.getElementById('i-interval-label').textContent = 'Complete!';
  document.getElementById('i-start-btn').textContent = 'START';
  document.getElementById('i-start-btn').className = 'ctrl-btn btn-start';
  document.getElementById('i-done-banner').classList.add('visible');
  updateListHighlight(9999);
}

function iRender() {
  const disp  = document.getElementById('i-time-display');
  const phase = document.getElementById('i-phase-label');
  const label = document.getElementById('i-interval-label');
  const ring  = document.getElementById('i-ring');

  if (iStatus === 'idle' || iPhaseIdx < 0 || !iPhases.length) {
    disp.textContent  = '--:--';
    phase.textContent = 'READY';
    phase.style.color = 'var(--muted)';
    disp.style.color  = 'var(--text)';
    setRing('i-ring', 0);
    ring.style.stroke = 'var(--accent)';
    label.textContent = '\u2014 / \u2014';
    return;
  }
  disp.textContent = fmt(iRemaining);
  const p = iPhases[Math.min(iPhaseIdx, iPhases.length - 1)];
  if (p.type === 'warmup') {
    phase.textContent = 'WARMUP';
    phase.style.color = 'var(--accent2)';
    disp.style.color  = 'var(--accent2)';
    ring.style.stroke = 'var(--accent2)';
    label.textContent = 'Warming up\u2026';
  } else if (p.type === 'p100') {
    phase.textContent = '\ud83d\udca5 100% POWER';
    phase.style.color = 'var(--work)';
    disp.style.color  = 'var(--work)';
    ring.style.stroke = 'var(--work)';
    label.textContent = p.label;
  } else {
    phase.textContent = '\ud83d\udea3 75% POWER';
    phase.style.color = 'var(--rest)';
    disp.style.color  = 'var(--rest)';
    ring.style.stroke = 'var(--rest)';
    label.textContent = p.label;
  }
  setRing('i-ring', iTotalSec > 0 ? iRemaining / iTotalSec : 0);
}

function intervalReset() {
  clearInterval(iTimer);
  iStatus         = 'idle';
  iPhaseIdx       = -1;
  iRemaining      = 0;
  iEditMode       = false;
  iClipboard      = null;
  iPlanCustomized = false;
  document.getElementById('i-start-btn').textContent = 'START';
  document.getElementById('i-start-btn').className = 'ctrl-btn btn-start';
  document.getElementById('i-done-banner').classList.remove('visible');
  const eb = document.getElementById('edit-plan-btn');
  if (eb) { eb.classList.remove('active'); eb.textContent = '\u270f\ufe0f Edit Workout Plan'; }
  iRender();
  buildList();
}

// ─────────────────────────────────────────────────────────────────
//  COUNTDOWN MODE
// ─────────────────────────────────────────────────────────────────
let cTimer = null;
let cRemaining = 0;
let cTotal = 0;
let cRunning = false;
let cPaused = false;

function countdownStart() {
  if (cPaused) {
    cPaused = false;
    cRunning = true;
    document.getElementById('c-start-btn').textContent = 'PAUSE';
    document.getElementById('c-start-btn').className = 'ctrl-btn btn-pause';
    cRun();
    return;
  }
  if (cRunning) {
    clearInterval(cTimer);
    cRunning = false;
    cPaused = true;
    document.getElementById('c-start-btn').textContent = 'RESUME';
    document.getElementById('c-start-btn').className = 'ctrl-btn btn-start';
    return;
  }
  // fresh
  document.getElementById('c-done-banner').classList.remove('visible');
  cTotal = getVal('c-min')*60 + getVal('c-sec');
  if (cTotal <= 0) return;
  cRemaining = cTotal;
  cRunning = true;
  cPaused = false;
  document.getElementById('c-start-btn').textContent = 'PAUSE';
  document.getElementById('c-start-btn').className = 'ctrl-btn btn-pause';
  document.getElementById('c-phase-label').textContent = '🚣 ROWING';
  document.getElementById('c-phase-label').style.color = 'var(--work)';
  document.getElementById('c-time-display').style.color = 'var(--work)';
  document.getElementById('c-ring').style.stroke = 'var(--work)';
  cRender();
  cRun();
}

function cRun() {
  clearInterval(cTimer);
  cTimer = setInterval(() => {
    cRemaining--;
    if (cRemaining <= 3 && cRemaining > 0) beepTick();
    if (cRemaining <= 0) {
      clearInterval(cTimer);
      cRunning = false;
      beepDone();
      flashScreen('#22c55e');
      document.getElementById('c-time-display').textContent = '00:00';
      document.getElementById('c-phase-label').textContent = 'DONE';
      document.getElementById('c-phase-label').style.color = 'var(--work)';
      document.getElementById('c-sub-label').textContent = 'Great work!';
      document.getElementById('c-progress').style.width = '0%';
      setRing('c-ring', 0);
      document.getElementById('c-start-btn').textContent = 'START';
      document.getElementById('c-start-btn').className = 'ctrl-btn btn-start';
      document.getElementById('c-done-banner').classList.add('visible');
      return;
    }
    cRender();
  }, 1000);
}

function cRender() {
  document.getElementById('c-time-display').textContent = fmt(cRemaining);
  const frac = cTotal > 0 ? cRemaining / cTotal : 1;
  setRing('c-ring', frac);
  document.getElementById('c-progress').style.width = (frac * 100) + '%';
  const elapsed = cTotal - cRemaining;
  const m = Math.floor(elapsed/60), s = elapsed%60;
  document.getElementById('c-sub-label').textContent = `Elapsed: ${fmt(elapsed)}`;
}

function countdownReset() {
  clearInterval(cTimer);
  cRunning = false;
  cPaused = false;
  cRemaining = 0;
  document.getElementById('c-start-btn').textContent = 'START';
  document.getElementById('c-start-btn').className = 'ctrl-btn btn-start';
  document.getElementById('c-phase-label').textContent = 'READY';
  document.getElementById('c-phase-label').style.color = 'var(--accent2)';
  document.getElementById('c-time-display').textContent = '--:--';
  document.getElementById('c-time-display').style.color = 'var(--accent2)';
  document.getElementById('c-ring').style.stroke = 'var(--accent2)';
  document.getElementById('c-sub-label').textContent = 'Set your time above';
  document.getElementById('c-progress').style.width = '100%';
  document.getElementById('c-done-banner').classList.remove('visible');
  setRing('c-ring', 1);
}

// ─────────────────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────────────────
buildList();
countdownReset();

// Allow typing directly into inputs to rebuild list
['i-work-min','i-work-sec','i-rest-min','i-rest-sec','i-warmup-min','i-warmup-sec'].forEach(id => {
  document.getElementById(id).addEventListener('change', buildList);
});
document.getElementById('i-count').addEventListener('change', buildList);

// Register service worker for offline use
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
